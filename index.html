<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Discover, shortlist and manage top creators across Instagram, YouTube and TikTok." />
    <meta name="theme-color" content="#0b0b12" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet" />
    <script>
      // Set theme before paint to avoid flash of wrong theme.
      (function () {
        try {
          const stored = JSON.parse(localStorage.getItem('wobb-theme') || 'null');
          const mode = stored && stored.state && stored.state.mode;
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const dark = mode === 'dark' || (mode !== 'light' && prefersDark);
          if (dark) document.documentElement.classList.add('dark');
        } catch (_) {}
      })();
    </script>
    <title>Wobb — Discover creators</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
